version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fastapi-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5673:5672"
      - "15673:15672"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # IMPORTANTE PARA DESARROLLADORES:
    # Para que el contenedor pueda comunicarse con el hardware (ej. Dynamixel U2D2, MCU de recolección),
    # se debe mapear el puerto serial del host al contenedor usando 'devices'.
    # 
    # En Linux:
    # devices:
    #   - "/dev/ttyUSB0:/dev/ttyUSB0"
    #   - "/dev/serial/by-id/usb-FTDI...:/dev/serial/by-id/usb-FTDI..."
    #
    # En Windows (Docker Desktop / WSL2), los puertos COM nativos no se mapean fácilmente usando 'devices'.
    # Se recomienda correr el backend nativamente fuera de Docker en Windows si se necesita acceso serial,
    # o usar herramientas como usbipd-win para enlazar el dispositivo USB a WSL2 y luego mapearlo como /dev/ttyUSBX.
    environment:
      - POSTGRES_URL=postgresql+asyncpg://postgres:password123@db:5432/fastapi-db
      - REDIS_URL=redis://redis:6379/7
      - CELERY_BROKER_URL=amqp://rabbit:password@rabbitmq:5672//
      - CELERY_BACKEND_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEBUG=1
    depends_on:
      - db
      - redis
      - rabbitmq

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A worker worker --loglevel=info
    # IMPORTANTE: Al igual que el backend, si Celery necesita comunicarse con el hardware
    # de forma asíncrona (ej. para calibración o tareas en segundo plano largas), 
    # deberás descomentar y configurar el mapeo de 'devices'.
    # devices:
    #   - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      - POSTGRES_URL=postgresql+asyncpg://postgres:password123@db:5432/fastapi-db
      - REDIS_URL=redis://redis:6379/7
      - CELERY_BROKER_URL=amqp://rabbit:password@rabbitmq:5672//
      - CELERY_BACKEND_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      - db
      - redis
      - rabbitmq
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    command: pnpm run dev --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
